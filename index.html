<!DOCTYPE html>
<html>
  <head>
    <title>XplorOcean - Marine Exploration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
  </head>

  <body>

    <!-- main menu -->
    <div id="main-menu">
      <h1>XPLOROCEAN</h1>
      <p>Select a Zone to Explore</p>
      <div class="menu-options">
        <button onclick="transport('sunlight')">SUNLIGHT ZONE</button>
        <button onclick="transport('twilight')">TWILIGHT ZONE</button>
        <button onclick="transport('midnight')">MIDNIGHT ZONE</button>
      </div>
    </div>

    <!-- back to menu button -->
    <button id="back-btn" onclick="backToMenu()" style="display:none">&#8592; MAIN MENU</button>

    <!-- scanner modal -->
    <div id="scanner-modal">
      <button id="modal-close" onclick="closeModal()">X</button>
      <div class="modal-content">
        <div class="modal-left">
          <img id="modal-img" src="" alt="Marine Life">
          <p><strong>Name:</strong> <span id="modal-name"></span></p>
          <p><strong>Scientific name:</strong> <span id="modal-sci"></span></p>
          <p><strong>Family:</strong> <span id="modal-fam"></span></p>
        </div>
        <div class="modal-right">
          <div id="facts-container">
            <h4>Fun facts:</h4>
            <p id="modal-facts"></p>
          </div>
          <h4>Pollution impact:</h4>
          <p id="modal-impact"></p>
        </div>
      </div>
    </div>

    <!-- a-frame scene -->
    <a-scene fog="type: exponential; color: #005F8A; density: 0.06" cursor="rayOrigin: mouse">

      <!-- assets -->
      <a-assets timeout="60000">
        <a-asset-item id="blue-whale"            src="assets/blue_whale.glb"></a-asset-item>
        <a-asset-item id="bobtail-squid"         src="assets/bobtail_squid_compressed.glb"></a-asset-item>
        <a-asset-item id="bottlenose-dolphin"    src="assets/bottlenose_dolphin.glb"></a-asset-item>

        <a-asset-item id="clownfish"             src="assets/clownfish.glb"></a-asset-item>
        <a-asset-item id="firefly-squid"         src="assets/firefly_squid.glb"></a-asset-item>
        <a-asset-item id="flower-hat-jellyfish"  src="assets/flower_hat_jellyfish.glb"></a-asset-item>
        <a-asset-item id="octopus"               src="assets/giant_pacific_octopus_compressed.glb"></a-asset-item>
        <a-asset-item id="great-white-shark"     src="assets/great_white_shark_compressed.glb"></a-asset-item>
        <a-asset-item id="green-sea-turtle"      src="assets/green_sea_turtle_compressed.glb"></a-asset-item>

      <!-- sky -->
      <a-sky id="main-sky" color="#003A52"></a-sky>

      <!-- sunlight zone -->
      <a-entity id="sunlight-zone" visible="false">

        <!-- lighting -->
        <a-light type="ambient"     color="#0096C7" intensity="0.6"></a-light>
        <a-light type="directional" color="#CAF0F8" intensity="1.5" position="1 10 -2"></a-light>
        <a-light type="point"       color="#6B9E8C" intensity="0.8" position="0 5 0"></a-light>

        <!-- light rays -->
        <a-entity geometry="primitive: cone; height: 25; radiusBottom: 5; radiusTop: 0.2"
          material="color: #ADE8F4; opacity: 0.07; transparent: true"
          position="-2 12 -22" rotation="15 0 -10"></a-entity>
        <a-entity geometry="primitive: cone; height: 20; radiusBottom: 3; radiusTop: 0.1"
          material="color: #CAF0F8; opacity: 0.05; transparent: true"
          position="3 10 -22" rotation="5 0 8"></a-entity>
        <a-entity geometry="primitive: cone; height: 18; radiusBottom: 2.5; radiusTop: 0.1"
          material="color: #CAF0F8; opacity: 0.04; transparent: true"
          position="-5 9 -22" rotation="8 0 5"></a-entity>

        <!-- === SUNLIGHT ZONE SEABED === -->
        <a-entity
          gltf-model="#seabed-terrain"
          position="0 -15 0"
          scale="7 7 7"
          rotation="0 0 0">
        </a-entity>

        <!-- particles -->
        <a-entity particle-system="preset: dust; particleCount: 300;
          color: #90E0EF; size: 0.04; opacity: 0.3; velocityValue: 0 0.05 0">
        </a-entity>
